<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Eman App</title>

<style>
body{
    margin:0;
    font-family: Arial;
    overflow:hidden;
    text-align:center;
    background: linear-gradient(45deg,#ffd6e0,#ff9ab3);
    background-size:400% 400%;
    animation: bgMove 8s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.page{
    position:absolute;
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

.box{
    background: rgba(255,255,255,0.3);
    padding:30px;
    border-radius:25px;
    color:#ff2e63;
}

button{
    padding:12px 18px;
    margin:8px;
    border:none;
    border-radius:20px;
    background:#ff2e63;
    color:white;
    cursor:pointer;
}

#musicBtn{
    position:fixed;
    top:15px;
    left:15px;
    z-index:9999;
}

/* قلوب */
.heart{
    position:absolute;
    bottom:-20px;
    animation: float 6s linear forwards;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:0;}
    30%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<!-- 🎵 موسيقى الخلفية -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="toggleMusic()">🎵 تشغيل الموسيقى</button>

<!-- الصفحات -->
<div class="page active" id="p1">
    <div class="box">
        <h2>💖 إلى إيمان</h2>
        <button onclick="go('p2')">دخول</button>
    </div>
</div>

<div class="page" id="p2">
    <div class="box">
        <h2 id="msg">💖 أحبك يا إيمان</h2>
        <button onclick="love()">💞 تغيير الرسالة</button>
        <button onclick="go('p3')">سر</button>
        <button onclick="go('p1')">رجوع</button>
    </div>
</div>

<div class="page" id="p3">
    <div class="box">
        <h2>🔐 كلمة السر</h2>
        <input id="pass" placeholder="اكتب كلمة السر">
        <button onclick="check()">دخول</button>
        <button onclick="go('p2')">رجوع</button>
    </div>
</div>

<div class="page" id="p4">
    <div class="box">
        <h2>💖 رسالة خاصة</h2>
        <p>أنتِ أغلى شخص في حياتي ❤️</p>
        <button onclick="go('p2')">رجوع</button>
    </div>
</div>

<script>
let messages=[
"أحبك جدًا 💖",
"أنتِ روحي ❤️",
"أنتِ عالمي 💕",
"أشتاق إليك 💞"
];

let music = document.getElementById("bgMusic");
let isPlaying = false;

function toggleMusic(){
    if(!isPlaying){
        music.play();
        isPlaying = true;
        document.getElementById("musicBtn").innerText="⏸ إيقاف";
    }else{
        music.pause();
        isPlaying = false;
        document.getElementById("musicBtn").innerText="🎵 تشغيل";
    }
}

function go(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function love(){
    document.getElementById("msg").innerText =
    messages[Math.floor(Math.random()*messages.length)];
}

function check(){
    let v=document.getElementById("pass").value;
    if(v==="إيمان") go("p4");
    else alert("خطأ ❌");
}
</script>

</body>
</html>
